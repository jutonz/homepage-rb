name: "Ruby on Rails CI"
on:
  push:
    branches: [ "main" ]
  pull_request:
jobs:
  unit_tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://rails:password@localhost:5432/rails_test"
      TEST_KEY: ${{ secrets.TEST_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install imagemagick libvips
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: echo -n $TEST_KEY > config/credentials/test.key
      - run: bin/rails db:setup assets:precompile
      - run: >-
          bin/rspec
          --exclude-pattern "spec/system/**/*_spec.rb"

  system_tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: "postgres://rails:password@localhost:5432/rails_test"
      TEST_KEY: ${{ secrets.TEST_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install imagemagick libvips
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(bundle exec ruby -e \
            'require "playwright"; puts Playwright::COMPATIBLE_PLAYWRIGHT_VERSION.strip'\
          )" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-v1-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npx --yes playwright@${{ steps.playwright-version.outputs.version }} \
            install chromium
      - run: echo -n $TEST_KEY > config/credentials/test.key
      - run: bin/rails db:setup assets:precompile
      - run: bin/rspec spec/system

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec standardrb
      - run: ./bin/brakeman

  build_push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.KAMAL_REGISTRY_USERNAME }}
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            jutonz/homepage-rb:latest
            jutonz/homepage-rb:${{ github.sha }}
          cache-from: type=registry,ref=jutonz/homepage-rb-build-cache:latest,mode=max,image-manifest=true,oci-mediatypes=true
          cache-to: type=registry,ref=docker.io/jutonz/homepage-rb-build-cache:latest,mode=max,image-manifest=true,oci-mediatypes=true

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ["build_push"]
    concurrency:
      group: deploy
    steps:
      - uses: azure/setup-kubectl@v4
      - name: Set the Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          # https://github.com/Azure/k8s-set-context?tab=readme-ov-file#service-account-approach
          # kb get secret github-actions-token -o yaml | pbcopy
          method: service-account
          k8s-url: ${{ secrets.KUBERNETES_URL }}
          k8s-secret: ${{ secrets.KUBERNETES_SECRET }}
      - run: kubectl set image deployment/web web=jutonz/homepage-rb:${{ github.sha }} -nhomepage-rb
      - run: kubectl rollout status deployment/web -nhomepage-rb
